<!DOCTYPE html>
<html lang="en">
<head>

  <title>Wallet</title>
  <link rel="stylesheet" href="service.css" />
</head>
<body>

<header class="topbar">
  <div class="brand">IH Hub</div>
  <nav class="nav">

</header>

<section class="hero">
  <h1>Your Wallet</h1>

</section>

<section class="section">

  <div class="wallet-card">
    <h2>Balance</h2>

<section class="section">

  <div class="transaction">

    <span>- $10</span>

  <div class="transaction">

    <span>- $15</span>

  <div class="transaction">
    <p>💵 Loan Received</p>
    <span>+ $100</span>

  <div class="transaction">

    <span>+ $50</span>
